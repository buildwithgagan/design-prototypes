document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\" data-dc-script=\"\" data-props=\"{&quot;theme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dark&quot;, &quot;light&quot;], &quot;default&quot;: &quot;dark&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen: 'welcome', mode: null, section: 'app', adminScreen: 'dash', vw: 1400, vh: 900 };\n  componentDidMount() {\n    this._fit = () => this.setState({ vw: window.innerWidth, vh: window.innerHeight });\n    this._fit();\n    window.addEventListener('resize', this._fit);\n  }\n  componentWillUnmount() { window.removeEventListener('resize', this._fit); }\n  renderVals() {\n    const mode = this.state.mode ?? (this.props.theme ?? 'dark');\n    const dark = mode === 'dark';\n    const D = \"--bg:#0e1014;--sf:#171a21;--sf2:#1b1e26;--bub:#1c2029;--bd:rgba(238,240,244,0.09);--bd2:rgba(238,240,244,0.2);--tx:#eef0f4;--tx2:rgba(238,240,244,0.62);--tx3:rgba(238,240,244,0.45);--chip:rgba(238,240,244,0.08);--ac:#8b7dff;--act:#a89bff;--acbg:rgba(139,125,255,0.16);--acbd:rgba(139,125,255,0.45);--onac:#0e1014;--gn:#7de3a1;--gnt:#7de3a1;--gnbg:rgba(125,227,161,0.14);--rd:#ff7a8a;--heroGrad:radial-gradient(90% 60% at 50% -5%, #1e1a33 0%, #0e1014 60%);--matchGrad:radial-gradient(90% 55% at 50% 30%, #241e42 0%, #0e1014 70%);--partyGrad:linear-gradient(140deg, #1d1936 0%, #171a21 60%);--mapBg:linear-gradient(160deg, #14171d 0%, #10131a 100%);--mapGrid:rgba(238,240,244,0.045);--mapA:rgba(139,125,255,0.08);--glass:rgba(14,16,20,0.85);--shadow:0 20px 44px rgba(0,0,0,0.45);--acShadow:0 8px 24px rgba(139,125,255,0.4);--am:#ffce6b;--ambg:rgba(255,206,107,0.14)\";\n    const L = \"--bg:#f3f3f8;--sf:#ffffff;--sf2:#f7f7fb;--bub:#eceaf4;--bd:rgba(22,24,31,0.1);--bd2:rgba(22,24,31,0.22);--tx:#16181f;--tx2:rgba(22,24,31,0.64);--tx3:rgba(22,24,31,0.46);--chip:rgba(22,24,31,0.06);--ac:#6f5ce6;--act:#5d4bd0;--acbg:rgba(111,92,230,0.12);--acbd:rgba(111,92,230,0.45);--onac:#ffffff;- le Game Masters — running style, systems, capacity — with party acceptance votes. Mutual acceptance locks the GM in.'],\n      chat: ['09', 'Group chat', 'Coordination without sharing personal contact details: group chat, a votable venue suggestion card, and voice calling from the header.'],\n      venues: ['10', 'Safe venues', 'Curated, admin-approved public meet-up spots on a map — never a private home. Venue amenities, directions and one-tap suggestion to the party.'],\n      rate: ['11', 'Rate session', 'Lightweight thumbs up / down per person with reason chips, plus report and block for safety. This data feeds Phase 2 AI personalisation.'],\n      profile: ['12', 'Profile & privacy', 'Your own profile with play stats, games and availability, plus the privacy layer: visibility, hidden location and blocked users.'],\n    };\n    const AMETA = {\n      dash: ['01', 'Admin dashboard', 'The control centre: totals for users, Game Masters, active parties, matches, pending reports and waitlist sign-ups, with weekly growth and quick links into every module.'],\n      users: ['02', 'User & GM management', 'Search and filter every account, review profiles and session history, verify identities, and warn / suspend / ban when needed.'],\n      config: ['03', 'Matchmaking configuration', 'Tune matching behaviour without code changes: factor weighting sliders, search radius, party size rules, and Game Master pairing rules.'],\n      games: ['04', 'Game library & taxonomy', 'The catalogue of games and play-style tags that profiles and the algorithm rely on, organised into RPG / card / board categories.'],\n      venues: ['05', 'Safe venue management', 'Curate the approved list of public meet-up spaces, maintain details and capacity, and review partner venue applications.'],\n      reports: ['06', 'Reports & moderation', 'The report queue with severity, full context on the reported user, moderation actions and a complete audit log.'],\n      waitlist: ['07', 'Waitlist & early access', 'Pre-launch sign-ups segmented by region against the launch threshold, early-access perk configuration and launch notifications.'],\n    };\n    const sec = this.state.section;\n    const isApp = sec === 'app';\n    const a = this.state.adminScreen;\n    const goA = (k) => () => this.setState({ section: 'admin', adminScreen: k });\n    const m = isApp ? META[s] : AMETA[a];\n    const on = 'rgba(111,92,230,0.16)';\n    const off = 'transparent';\n    const vw = this.state.vw, vh = this.state.vh;\n    const appScale = Math.max(0.3, Math.min(1, (vh - 36) / 874, (vw - 426) / 402));\n    const adminScale = Math.max(0.3, Math.min(1, (vh - 48) / 830, (vw - 424) / 1290));\n    return {\n      screenNum: m[0], screenTitle: m[1], screenDesc: m[2],\n      screenTotal: isApp ? '12' : '07',\n      fitScale: isApp ? appScale : adminScale,\n      sApp: isApp, sAdmin: !isApp,\n      setApp: () => this.setState({ section: 'app' }),\n      setAdmin: () => this.setState({ section: 'admin' }),\n      chModeApp: isApp ? '#1a1a1f' : 'transparent',\n      chModeAppC: isApp ? '#ffffff' : 'rgba(26,26,31,0.6)',\n      chModeAdmin: !isApp ? '#1a1a1f' : 'transparent',\n      chModeAdminC: !isApp ? '#ffffff' : 'rgba(26,26,31,0.6)',\n      goADash: goA('dash'), goAUsers: goA('users'), goAConfig: goA('config'), goAGames: goA('games'), goAVenues: goA('venues'), goAReports: goA('reports'), goAWaitlist: goA('waitlist'),\n      chADash: (!isApp && a === 'dash') ? on : off, chAUsers: (!isApp && a === 'users') ? on : off, chAConfig: (!isApp && a === 'config') ? on : off, chAGames: (!isApp && a === 'games') ? on : off, chAVenues: (!isApp && a === 'venues') ? on : off, chAReports: (!isApp && a === 'reports') ? on : off, chAWaitlist: (!isApp && a === 'waitlist') ? on : off,\n      navADash: a === 'dash' ? 'var(--acbg)' : 'transparent', navAUsers: a === 'users' ? 'var(--acbg)' : 'transparent', navAConfig: a === 'config' ? 'var(--acbg)' : 'transparent', navAGames: a === 'games' ? 'var(--acbg)' : 'transparent', navAVenues: a === 'venues' ? 'var(--acbg)' : 'transparent', navAReports: a === 'reports' ? 'var(--acbg)' : 'transparent', navAWaitlist: a === 'waitlist' ? 'var(--acbg)' : 'transparent',\n      sADash: a === 'dash', sAUsers: a === 'users', sAConfig: a === 'config', sAGames: a === 'games', sAVenues: a === 'venues', sAReports: a === 'reports', sAWaitlist: a === 'waitlist',\n      chWelcome: s==='welcome'?on:off, chRole: s==='role'?on:off, chSetup: s==='setup'?on:off,\n      chCards: s==='cards'?on:off, chList: s==='list'?on:off, chMatch: s==='match'?on:off,\n      chParty: s==='party'?on:off, chGM: s==='gm'?on:off, chChat: s==='chat'?on:off,\n      chVenues: s==='venues'?on:off, chRate: s==='rate'?on:off, chProfile: s==='profile'?on:off,\n      isDark: dark,\n      themeVars: dark ? D : L,\n      modeButtonText: dark ? '☀ View light mode' : '☾ View dark mode',\n      sWelcome: s === 'welcome', sRole: s === 'role', sSetup: s === 'setup',\n      sCards: s === 'cards', sList: s === 'list', sMatch: s === 'match',\n      sParty: s === 'party', sGM: s === 'gm', sChat: s === 'chat',\n      sVenues: s === 'venues', sRate: s === 'rate', sProfile: s === 'profile',\n      goWelcome: go('welcome'), goRole: go('role'), goSetup: go('setup'),\n      goCards: go('cards'), goList: go('list'), goMatch: go('match'),\n      goParty: go('party'), goGM: go('gm'), goChat: go('chat'),\n      goVenues: go('venues'), goRate: go('rate'), goProfile: go('profile'),\n      toggleMode: () => this.setState({ mode: dark ? 'light' : 'dark' }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
